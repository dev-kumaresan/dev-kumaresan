name: Update Contributions and Streak

on:
  push:
    branches:
      - main

jobs:
  update-contributions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch contribution count using GitHub API
        run: |
          # Get the total contributions using the GitHub API
          USERNAME=dev-kumaresan  # Your GitHub username
          TOKEN=${{ secrets.GITHUB_TOKEN }}  # GitHub token for authentication
          
          # Fetch total contributions from the GitHub API
          CONTRIBUTIONS=$(curl -s -H "Authorization: token $TOKEN" "https://api.github.com/users/$USERNAME/events/public" | grep -o '"created_at": "[^"]*' | wc -l)
          echo "Total Contributions: $CONTRIBUTIONS"
          echo "CONTRIBUTIONS=$CONTRIBUTIONS" >> $GITHUB_ENV

      - name: Update README.md with new contribution count
        run: |
          # Update README.md with the new contribution count
          sed -i "s/Total Contributions: [0-9]*/Total Contributions: $CONTRIBUTIONS/" README.md
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "Update total contributions"
          git push
